[cache]
persistent = true

[sites.default]
roots = []
max_redirects = 8
schemes = ["https"]
statuses = [200]
timeout = "30s"

[sites.default.cache]
max_age = "1w"

[sites.default.retry]
count = 3
factor = 2
interval = { initial = "500ms", cap = "10s" }
statuses = [408, 502, 503, 504]

[sites.default.headers]
user-agent = "Muffy/0.2.0"

[sites.default.validation]
svg = {}
css = true

[sites.default.validation.html]
ignored_attributes = ["align", "data-.*", "sl-.*"]
ignored_elements = [
  "astro-island",
  "mobile-starlight-.*",
  "monza-editor",
  "picolight-.*",
  "site-search",
  "sl-.*",
  "starlight-.*",
  # TODO Fix HTML elements not well-formed.
  "div",
  "style",
  # TODO Allow inlined SVG elements.
  "circle",
  "foreignObject",
  "path",
  "picture",
  "svg",
]

[sites.external]
extend = "default"

[sites.external.cache]
max_age = "1h"

[sites.main]
extend = "default"
roots = [
  "https://raviqqe.com/",
  "https://raviqqe.com/muffet",
  "https://raviqqe.com/muffy",
  "https://raviqqe.com/stak",
]
recurse = true

[sites.algo_logic]
extend = "external"
roots = ["https://algo-logic.info/"]
fragments_ignored = true
timeout = "1m"

[sites.crates_io]
extend = "external"
roots = ["https://crates.io/"]
statuses = [200, 403, 404]

[sites.github]
extend = "external"
roots = ["https://github.com/"]
concurrency = 64
fragments_ignored = true

[sites.github.rate_limit]
supply = 10
window = "1s"

[sites.zulip]
extend = "external"
roots = ["https://prog-lang-sys-ja.zulipchat.com/"]
fragments_ignored = true

[sites.broad_200]
extend = "external"
roots = ["https://infoscience.epfl.ch/", "https://www.semanticscholar.org/"]
statuses = [200, 202]

[sites.rate_limited]
extend = "external"
roots = [
  "https://dblp.org/",
  "https://www.lambdanote.com/",
  "https://www.youtube.com/"
]
statuses = [200, 429]

[sites.rate_limited.rate_limit]
supply = 1
window = "1s"

[sites.flaky]
extend = "external"
roots = ["https://gitlab.haskell.org/", "https://zsh.sourceforge.io/"]
timeout = "30s"

[sites.flaky.retry]
count = 5

[sites.forbidden]
extend = "external"
roots = [
  "https://armoredcore.fandom.com/",
  "https://dl.acm.org/",
  "https://dragonquest.fandom.com/",
  "https://en.wikipedia.org/wiki/",
  "https://englia.app/",
  "https://jcsites.juniata.edu/",
  "https://mojolang.org/",
  "https://qiita.com/",
  "https://www.npmjs.com/",
  "https://www.oreilly.com/",
  "https://www.researchgate.net/",
]
statuses = [200, 403]

[sites.ignored]
roots = [
  "https://aclanthology.org/",
  "https://goreportcard.com/",
  "https://r7rs.org/",
  "https://www.gnu.org/software/guile/",
]
ignore = true
