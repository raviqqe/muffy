name: test
on:
  push:
    branches:
      - main
  pull_request:
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: raviqqe/cargo-cache@4c7db86c0f73cc94a5608ad8b09e7a8e136fd259 # v1.0.4
      - run: cargo build
  unit_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: raviqqe/cargo-cache@4c7db86c0f73cc94a5608ad8b09e7a8e136fd259 # v1.0.4
      - run: cargo test
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - run: tools/coverage.sh
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          fail_ci_if_error: true
          files: lcov.info
  check_command_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: raviqqe/cargo-cache@4c7db86c0f73cc94a5608ad8b09e7a8e136fd259 # v1.0.4
      - run: cargo run -- --verbose
  check_site_command_test:
    strategy:
      fail-fast: false
      matrix:
        arguments:
          - - --accept-status 200
            - --accept-status 202
            - --accept-status 403
            - --accept-status 999
            - --ignore https://aclanthology.org/
            - --ignore https://algo-logic.info/
            - --ignore https://crates.io/
            - --ignore https://github.com/raviqqe/stak
            - --ignore https://www.gnu.org/software/guile/
            - https://raviqqe.com
          - - --accept-status 200
            - --accept-status 403
            - --ignore https://codspeed.io/raviqqe/stak
            - --ignore https://r7rs.org/
            - --ignore https://www.gnu.org/software/guile/
            - --header accept:text/html,*/*
            - https://raviqqe.com/stak
          - - --accept-status 200
            - --accept-status 403
            - --ignore https://crates.io/crates/muffy
            - https://raviqqe.com/muffy
          - - --ignore https://goreportcard.com/
            - https://raviqqe.com/muffet
        cache:
          - false
          - true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: raviqqe/cargo-cache@4c7db86c0f73cc94a5608ad8b09e7a8e136fd259 # v1.0.4
      - run: >
          cargo run -- check-site
          --concurrency 64
          --header user-agent:Muffy/0.2.0
          --retry-count 5
          --retry-status 408
          --retry-status 500
          --retry-status 502
          --retry-status 503
          --retry-status 504
          --verbose
          ${{ matrix.cache && '--cache' || '' }}
          ${{ join(matrix.arguments, ' ') }}
  docker_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: raviqqe/cargo-cache@4c7db86c0f73cc94a5608ad8b09e7a8e136fd259 # v1.0.4
      - id: version
        run: tools/github/version.sh
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          tags: raviqqe/muffy:${{ steps.version.outputs.version }}
      - uses: ./.
        with:
          verbose: true
  test:
    needs:
      - build
      - unit_test
      - coverage
      - check_command_test
      - check_site_command_test
      - docker_test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: for result in ${{ join(needs.*.result, ' ') }}; do [ $result = success ]; done
