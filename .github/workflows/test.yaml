name: test
on:
  push:
    branches:
      - main
  pull_request:
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          submodules: true
      - uses: raviqqe/cargo-cache@6d2d8fbe4fc04627b0a05f603fce1dc9fd0baf0d # v1.0.0
      - run: cargo build
  unit_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          submodules: true
      - uses: raviqqe/cargo-cache@6d2d8fbe4fc04627b0a05f603fce1dc9fd0baf0d # v1.0.0
      - run: cargo test
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          submodules: true
      - run: tools/coverage.sh
      - uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7 # v5.5.1
        with:
          fail_ci_if_error: true
          files: lcov.info
  check_command_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          submodules: true
      - uses: raviqqe/cargo-cache@6d2d8fbe4fc04627b0a05f603fce1dc9fd0baf0d # v1.0.0
      - run: cargo run -- --verbose
  check_site_command_test:
    strategy:
      fail-fast: false
      matrix:
        arguments:
          - - --accept-status 200
            - --accept-status 403
            - --accept-status 999
            - --ignore https://aclanthology.org/
            - https://raviqqe.com
          - - --accept-status 200
            - --accept-status 403
            - --ignore https://codspeed.io/raviqqe/stak
            - --ignore https://r7rs.org/
            - --ignore https://www.gnu.org/software/guile/
            - --header accept:text/html,*/*
            - https://raviqqe.com/stak
          - - --accept-status 200
            - --accept-status 403
            - --ignore https://crates.io/crates/muffy
            - https://raviqqe.com/muffy
          - - --ignore https://goreportcard.com/
            - https://raviqqe.com/muffet
        cache:
          - false
          - true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          submodules: true
      - uses: raviqqe/cargo-cache@6d2d8fbe4fc04627b0a05f603fce1dc9fd0baf0d # v1.0.0
      - run: >
          cargo run -- check-site
          --header user-agent:Muffy/0.2.0
          --retry-count 5
          --retry-status 408
          --retry-status 502
          --retry-status 503
          --retry-status 504
          --verbose
          ${{ matrix.cache && '--cache' || '' }}
          ${{ join(matrix.arguments, ' ') }}
  docker_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          submodules: true
      - uses: raviqqe/cargo-cache@6d2d8fbe4fc04627b0a05f603fce1dc9fd0baf0d # v1.0.0
      - id: version
        run: tools/github/version.sh
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          tags: raviqqe/muffy:${{ steps.version.outputs.version }}
      - uses: ./.
        with:
          verbose: true
  test:
    needs:
      - build
      - unit_test
      - coverage
      - check_command_test
      - check_site_command_test
      - docker_test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: for result in ${{ join(needs.*.result, ' ') }}; do [ $result = success ]; done
