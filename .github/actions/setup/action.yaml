name: setup
description: Sets up development environment
inputs: {}
outputs: {}
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4.2.0
      with:
        package_json_file: doc/package.json
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v6.3.0
      with:
        cache: pnpm
        cache-dependency-path: doc/pnpm-lock.yaml
        node-version-file: doc/package.json
    - run: pnpm i --frozen-lockfile
      working-directory: doc
      shell: bash
